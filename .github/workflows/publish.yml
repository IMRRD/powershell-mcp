name: Publish to npm

# Publishes @imrrd/powershell-mcp when a GitHub Release is published,
# or manually via the Actions tab. Auth uses npm Trusted Publishing (OIDC) -
# no NPM_TOKEN secret, and OIDC publishes are exempt from npm's 2FA prompt.

on:
  release:
    types: [published]
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # required for OIDC trusted publishing + provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Trusted publishing/OIDC needs a recent npm
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish
        run: npm publish --access public --provenance