# Add this location block inside the existing paperclip.mplace.co.za server block.
# It proxies /api/telemetry to the collector running on port 4242.

location /api/telemetry {
    proxy_pass         http://127.0.0.1:4242;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
    proxy_set_header   X-Real-IP $remote_addr;
    proxy_read_timeout 5s;
    proxy_connect_timeout 3s;
    client_max_body_size 16k;
}

location /telemetry-health {
    proxy_pass         http://127.0.0.1:4242/health;
    proxy_http_version 1.1;
    proxy_set_header   Host $host;
}
